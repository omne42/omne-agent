name: omne-node-vendor

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Rust/profile for build and vendor release"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      version:
        description: "Optional release version tag (empty => auto-generated)"
        required: false
        default: ""
        type: string
      clean:
        description: "Clean target vendor/release directories before packaging"
        required: true
        default: true
        type: boolean
  pull_request:
    paths:
      - "packages/omne/**"
      - ".github/workflows/omne-node-vendor.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "packages/omne/**"
      - ".github/workflows/omne-node-vendor.yml"

permissions:
  contents: read

jobs:
  verify-and-release-host-linux:
    name: verify-and-release-host (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CI: "1"
      OMNE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'debug' }}
      OMNE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/v') && github.ref_name || '') }}
      OMNE_CLEAN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          path: _deps/omne_foundation

      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          repository: omne42/ditto-llm
          path: _deps/ditto-llm

      - name: Move sibling repos into sibling layout
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ../omne_foundation
          rm -rf ../ditto-llm
          mv _deps/omne_foundation ../omne_foundation
          mv _deps/ditto-llm ../ditto-llm
          test -f ../omne_foundation/crates/notify-kit/Cargo.toml
          test -f ../ditto-llm/crates/ditto-core/Cargo.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Node checks
        run: npm --prefix ./packages/omne run check

      - name: Node tests
        run: npm --prefix ./packages/omne test

      - name: Build host binaries (debug)
        if: env.OMNE_PROFILE == 'debug'
        shell: bash
        run: cargo build -p omne -p omne-app-server

      - name: Build host binaries (release)
        if: env.OMNE_PROFILE == 'release'
        shell: bash
        run: cargo build -p omne -p omne-app-server --release

      - name: Build host vendor release bundle
        shell: bash
        run: |
          args=(./packages/omne/scripts/release-local-vendor-bundle.mjs --target-dir ./target --profile "$OMNE_PROFILE")
          if [[ -n "$OMNE_VERSION" ]]; then
            args+=(--version "$OMNE_VERSION")
          fi
          if [[ "$OMNE_CLEAN" == "true" ]]; then
            args+=(--clean)
          fi
          node "${args[@]}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omne-vendor-releases-ubuntu-latest
          path: packages/omne/dist/releases
          if-no-files-found: error

  verify-and-release-host-macos:
    name: verify-and-release-host (macos-latest)
    runs-on: macos-latest
    env:
      CARGO_TERM_COLOR: always
      CI: "1"
      OMNE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'debug' }}
      OMNE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/v') && github.ref_name || '') }}
      OMNE_CLEAN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          path: _deps/omne_foundation

      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          repository: omne42/ditto-llm
          path: _deps/ditto-llm

      - name: Move sibling repos into sibling layout
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ../omne_foundation
          rm -rf ../ditto-llm
          mv _deps/omne_foundation ../omne_foundation
          mv _deps/ditto-llm ../ditto-llm
          test -f ../omne_foundation/crates/notify-kit/Cargo.toml
          test -f ../ditto-llm/crates/ditto-core/Cargo.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Node checks
        run: npm --prefix ./packages/omne run check

      - name: Node tests
        run: npm --prefix ./packages/omne test

      - name: Build host binaries (debug)
        if: env.OMNE_PROFILE == 'debug'
        shell: bash
        run: cargo build -p omne -p omne-app-server

      - name: Build host binaries (release)
        if: env.OMNE_PROFILE == 'release'
        shell: bash
        run: cargo build -p omne -p omne-app-server --release

      - name: Build host vendor release bundle
        shell: bash
        run: |
          args=(./packages/omne/scripts/release-local-vendor-bundle.mjs --target-dir ./target --profile "$OMNE_PROFILE")
          if [[ -n "$OMNE_VERSION" ]]; then
            args+=(--version "$OMNE_VERSION")
          fi
          if [[ "$OMNE_CLEAN" == "true" ]]; then
            args+=(--clean)
          fi
          node "${args[@]}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omne-vendor-releases-macos-latest
          path: packages/omne/dist/releases
          if-no-files-found: error

  verify-and-release-host-windows:
    name: verify-and-release-host (windows-latest)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      group: windows-local
      labels: omne42-local
    concurrency:
      group: persistent-worktree-${{ github.repository }}
      cancel-in-progress: false
    env:
      CARGO_TERM_COLOR: always
      CI: "1"
      OMNE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'debug' }}
      OMNE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/v') && github.ref_name || '') }}
      OMNE_CLEAN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean || 'true' }}
      CARGO_HOME: C:\actions-cache\cargo
      RUSTUP_HOME: C:\actions-cache\rustup
      OMNE_AGENT_REPO_DIR: C:\actions-cache\repos\omne42\omne-agent
      OMNE_AGENT_MIRROR_DIR: C:\actions-cache\mirrors\omne42\omne-agent.git
      OMNE_FOUNDATION_REPO_DIR: C:\actions-cache\repos\omne42\omne_foundation
      OMNE_FOUNDATION_MIRROR_DIR: C:\actions-cache\mirrors\omne42\omne_foundation.git
      DITTO_LLM_REPO_DIR: C:\actions-cache\repos\omne42\ditto-llm
      DITTO_LLM_MIRROR_DIR: C:\actions-cache\mirrors\omne42\ditto-llm.git
    steps:
      - name: Sync persistent workspace
        id: sync
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $repoUrl = "https://github.com/${{ github.repository }}.git"
          $repoDir = $env:OMNE_AGENT_REPO_DIR
          $mirrorDir = $env:OMNE_AGENT_MIRROR_DIR
          $targetDir = Join-Path $repoDir "target"

          $before = [ordered]@{
            mirror_exists = Test-Path $mirrorDir
            repo_exists = Test-Path (Join-Path $repoDir ".git")
            cargo_registry_exists = Test-Path (Join-Path $env:CARGO_HOME "registry")
            target_exists = Test-Path $targetDir
            target_entries = if (Test-Path $targetDir) { (Get-ChildItem $targetDir -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          }

          New-Item -ItemType Directory -Force -Path $env:CARGO_HOME | Out-Null
          New-Item -ItemType Directory -Force -Path $env:RUSTUP_HOME | Out-Null
          New-Item -ItemType Directory -Force -Path (Split-Path $repoDir -Parent) | Out-Null
          New-Item -ItemType Directory -Force -Path (Split-Path $mirrorDir -Parent) | Out-Null

          git config --global http.version HTTP/1.1
          git config --global --add safe.directory $repoDir

          if (-not $before.mirror_exists) {
            git clone --mirror $repoUrl $mirrorDir
          }

          git -C $mirrorDir remote set-url origin $repoUrl
          git -C $mirrorDir fetch --prune origin "+refs/heads/*:refs/heads/*" "+refs/pull/*:refs/pull/*" "+refs/tags/*:refs/tags/*"

          if (-not $before.repo_exists) {
            git clone $mirrorDir $repoDir
          }

          git -C $repoDir remote set-url origin $repoUrl
          git -C $repoDir fetch --prune origin "+refs/heads/*:refs/remotes/origin/*" "+refs/pull/*:refs/remotes/pull/*" "+refs/tags/*:refs/tags/*"
          git -C $repoDir reset --hard $env:GITHUB_SHA
          git -C $repoDir clean -ffd

          $foundationRepoDir = $env:OMNE_FOUNDATION_REPO_DIR
          $foundationMirrorDir = $env:OMNE_FOUNDATION_MIRROR_DIR
          $foundationBeforeMirror = Test-Path $foundationMirrorDir
          $foundationBeforeRepo = Test-Path (Join-Path $foundationRepoDir ".git")

          New-Item -ItemType Directory -Force -Path (Split-Path $foundationRepoDir -Parent) | Out-Null
          New-Item -ItemType Directory -Force -Path (Split-Path $foundationMirrorDir -Parent) | Out-Null
          git config --global --add safe.directory $foundationRepoDir

          if (-not $foundationBeforeMirror) {
            git clone --mirror "https://github.com/omne42/omne_foundation.git" $foundationMirrorDir
          }

          git -C $foundationMirrorDir remote set-url origin "https://github.com/omne42/omne_foundation.git"
          git -C $foundationMirrorDir fetch --prune origin "+refs/heads/*:refs/heads/*" "+refs/pull/*:refs/pull/*" "+refs/tags/*:refs/tags/*"

          if (-not $foundationBeforeRepo) {
            git clone $foundationMirrorDir $foundationRepoDir
          }

          git -C $foundationRepoDir remote set-url origin "https://github.com/omne42/omne_foundation.git"
          git -C $foundationRepoDir fetch --prune origin "+refs/heads/*:refs/remotes/origin/*" "+refs/pull/*:refs/remotes/pull/*" "+refs/tags/*:refs/tags/*"
          git -C $foundationRepoDir reset --hard origin/main
          git -C $foundationRepoDir clean -ffd

          $dittoRepoDir = $env:DITTO_LLM_REPO_DIR
          $dittoMirrorDir = $env:DITTO_LLM_MIRROR_DIR
          $dittoBeforeMirror = Test-Path $dittoMirrorDir
          $dittoBeforeRepo = Test-Path (Join-Path $dittoRepoDir ".git")

          New-Item -ItemType Directory -Force -Path (Split-Path $dittoRepoDir -Parent) | Out-Null
          New-Item -ItemType Directory -Force -Path (Split-Path $dittoMirrorDir -Parent) | Out-Null
          git config --global --add safe.directory $dittoRepoDir

          if (-not $dittoBeforeMirror) {
            git clone --mirror "https://github.com/omne42/ditto-llm.git" $dittoMirrorDir
          }

          git -C $dittoMirrorDir remote set-url origin "https://github.com/omne42/ditto-llm.git"
          git -C $dittoMirrorDir fetch --prune origin "+refs/heads/*:refs/heads/*" "+refs/pull/*:refs/pull/*" "+refs/tags/*:refs/tags/*"

          if (-not $dittoBeforeRepo) {
            git clone $dittoMirrorDir $dittoRepoDir
          }

          git -C $dittoRepoDir remote set-url origin "https://github.com/omne42/ditto-llm.git"
          git -C $dittoRepoDir fetch --prune origin "+refs/heads/*:refs/remotes/origin/*" "+refs/pull/*:refs/remotes/pull/*" "+refs/tags/*:refs/tags/*"
          git -C $dittoRepoDir reset --hard origin/main
          git -C $dittoRepoDir clean -ffd

          $drive = $repoDir.Substring(0, 1).ToLowerInvariant()
          $rest = $repoDir.Substring(2).Replace('\', '/')
          $repoDirBash = "/$drive$rest"

          $report = [ordered]@{
            repository = $env:GITHUB_REPOSITORY
            sha = $env:GITHUB_SHA
            before = $before
            after_sync = [ordered]@{
              head = (git -C $repoDir rev-parse HEAD)
              repo_dir = $repoDir
              repo_dir_bash = $repoDirBash
            }
            ditto_llm = [ordered]@{
              mirror_existed_before = $dittoBeforeMirror
              repo_existed_before = $dittoBeforeRepo
              repo_dir = $dittoRepoDir
              head = (git -C $dittoRepoDir rev-parse HEAD)
            }
            omne_foundation = [ordered]@{
              mirror_existed_before = $foundationBeforeMirror
              repo_existed_before = $foundationBeforeRepo
              repo_dir = $foundationRepoDir
              head = (git -C $foundationRepoDir rev-parse HEAD)
            }
          }

          $reportPath = Join-Path $env:RUNNER_TEMP "persistent-cache-report.json"
          $report | ConvertTo-Json -Depth 6 | Out-File -FilePath $reportPath -Encoding utf8

          Write-Host "persistent-cache: mirror_exists_before=$($before.mirror_exists)"
          Write-Host "persistent-cache: worktree_exists_before=$($before.repo_exists)"
          Write-Host "persistent-cache: cargo_registry_exists_before=$($before.cargo_registry_exists)"
          Write-Host "persistent-cache: target_exists_before=$($before.target_exists)"
          Write-Host "persistent-cache: repo_dir=$repoDir"
          Write-Host "persistent-cache: synced_sha=$(git -C $repoDir rev-parse HEAD)"
          Write-Host "persistent-cache: foundation_sha=$(git -C $foundationRepoDir rev-parse HEAD)"
          Write-Host "persistent-cache: ditto_llm_sha=$(git -C $dittoRepoDir rev-parse HEAD)"

          "repo_dir_bash=$repoDirBash" >> $env:GITHUB_OUTPUT
          "report_path=$reportPath" >> $env:GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Record persistent target state before build
        id: target_before
        shell: pwsh
        run: |
          $targetDir = Join-Path $env:OMNE_AGENT_REPO_DIR "target"
          $count = if (Test-Path $targetDir) { (Get-ChildItem $targetDir -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          Write-Host "persistent-cache: target_entries_before_build=$count"
          "entry_count=$count" >> $env:GITHUB_OUTPUT

      - name: Node checks
        shell: bash
        env:
          OMNE_AGENT_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$OMNE_AGENT_REPO_DIR_BASH"
          npm --prefix ./packages/omne run check

      - name: Node tests
        shell: bash
        env:
          OMNE_AGENT_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$OMNE_AGENT_REPO_DIR_BASH"
          npm --prefix ./packages/omne test

      - name: Build host binaries (debug)
        if: env.OMNE_PROFILE == 'debug'
        shell: bash
        env:
          OMNE_AGENT_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$OMNE_AGENT_REPO_DIR_BASH"
          cargo build -p omne -p omne-app-server

      - name: Build host binaries (release)
        if: env.OMNE_PROFILE == 'release'
        shell: bash
        env:
          OMNE_AGENT_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$OMNE_AGENT_REPO_DIR_BASH"
          cargo build -p omne -p omne-app-server --release

      - name: Build host vendor release bundle
        shell: bash
        env:
          OMNE_AGENT_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$OMNE_AGENT_REPO_DIR_BASH"
          args=(./packages/omne/scripts/release-local-vendor-bundle.mjs --target-dir ./target --profile "$OMNE_PROFILE")
          if [[ -n "$OMNE_VERSION" ]]; then
            args+=(--version "$OMNE_VERSION")
          fi
          if [[ "$OMNE_CLEAN" == "true" ]]; then
            args+=(--clean)
          fi
          node "${args[@]}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omne-vendor-releases-windows-latest
          path: C:\actions-cache\repos\omne42\omne-agent\packages\omne\dist\releases
          if-no-files-found: error

      - name: Summarize persistent cache state
        if: always()
        shell: pwsh
        run: |
          $report = Get-Content "${{ steps.sync.outputs.report_path }}" | ConvertFrom-Json
          $targetDir = Join-Path $env:OMNE_AGENT_REPO_DIR "target"
          $afterCount = if (Test-Path $targetDir) { (Get-ChildItem $targetDir -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          $warmTarget = [int]${{ steps.target_before.outputs.entry_count }} -gt 0
          $warmCargoRegistry = [bool]$report.before.cargo_registry_exists

          $lines = @(
            "### Windows persistent workspace cache"
            "- repo dir: $($report.after_sync.repo_dir)"
            "- synced sha: $($report.after_sync.head)"
            "- omne_foundation sha: $($report.omne_foundation.head)"
            "- ditto-llm sha: $($report.ditto_llm.head)"
            "- mirror existed before run: $($report.before.mirror_exists)"
            "- worktree existed before run: $($report.before.repo_exists)"
            "- omne_foundation mirror existed before run: $($report.omne_foundation.mirror_existed_before)"
            "- omne_foundation worktree existed before run: $($report.omne_foundation.repo_existed_before)"
            "- ditto-llm mirror existed before run: $($report.ditto_llm.mirror_existed_before)"
            "- ditto-llm worktree existed before run: $($report.ditto_llm.repo_existed_before)"
            "- cargo registry existed before run: $warmCargoRegistry"
            "- target existed before run: $($report.before.target_exists)"
            "- target entries before build: ${{ steps.target_before.outputs.entry_count }}"
            "- target entries after build: $afterCount"
            "- warm cache hit: $([bool]($warmTarget -or $warmCargoRegistry))"
          )

          $lines | ForEach-Object { Write-Host $_ }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($lines -join "`n")

  publish-tag-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - verify-and-release-host-linux
      - verify-and-release-host-macos
      - verify-and-release-host-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Validate downloaded artifacts structure
        run: node ./packages/omne/scripts/validate-tag-release-artifacts.mjs --artifacts-root ./release-artifacts --tag-version "${TAG_VERSION}"

      - name: Bundle uploaded artifacts
        run: node ./packages/omne/scripts/package-tag-release-assets.mjs --artifacts-root ./release-artifacts --tag-version "${TAG_VERSION}" --out-dir ./release-bundles --payload-root ./release-payloads

      - name: Verify bundled release tarballs
        run: node ./packages/omne/scripts/verify-tag-release-tarballs.mjs --out-dir ./release-bundles --tag-version "${TAG_VERSION}"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bundles/*.tar.gz
            release-bundles/SHA256SUMS
          generate_release_notes: true
