name: Checkout Shared Deps
description: Checkout sibling repositories required by omne-agent local path dependencies.

inputs:
  repo-owner:
    description: GitHub owner that hosts the shared repositories.
    required: true
  token:
    description: Token with read access to the shared repositories.
    required: true
  foundation-ref:
    description: Ref to checkout for omne_foundation.
    required: false
    default: main
  runtime-ref:
    description: Ref to checkout for omne-runtime.
    required: false
    default: main
  ditto-ref:
    description: Ref to checkout for ditto-llm.
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Checkout omne_foundation
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repo-owner }}/omne_foundation
        ref: ${{ inputs.foundation-ref }}
        token: ${{ inputs.token }}
        path: _deps/omne_foundation
        fetch-depth: 1

    - name: Checkout omne-runtime
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repo-owner }}/omne-runtime
        ref: ${{ inputs.runtime-ref }}
        token: ${{ inputs.token }}
        path: _deps/omne-runtime
        fetch-depth: 1

    - name: Checkout ditto-llm
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repo-owner }}/ditto-llm
        ref: ${{ inputs.ditto-ref }}
        token: ${{ inputs.token }}
        path: _deps/ditto-llm
        fetch-depth: 1

    - name: Move shared repos into sibling layout
      shell: bash
      run: |
        set -euo pipefail
        rm -rf ../omne_foundation ../omne-runtime ../ditto-llm
        mv _deps/omne_foundation ../omne_foundation
        mv _deps/omne-runtime ../omne-runtime
        mv _deps/ditto-llm ../ditto-llm
        test -f ../omne_foundation/crates/error-kit/Cargo.toml
        test -f ../omne_foundation/crates/mcp-kit/Cargo.toml
        test -f ../omne-runtime/crates/omne-execution-gateway/Cargo.toml
        test -f ../ditto-llm/crates/ditto-core/Cargo.toml
        rmdir _deps 2>/dev/null || true
